<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home</title>
<style>
  :root{
    --bg: #0B0E15;
    --bg-alt: #11141C;
    --glass: rgba(255,255,255,0.055);
    --glass-hi: rgba(255,255,255,0.09);
    --glass-border: rgba(255,255,255,0.09);
    --text: #F3F5F8;
    --text-muted: #8891A3;
    --accent: #FF5B35;
    --accent-light: #FF7A54;
    --accent-ink: #1A0800;
    --live: #E5484D;
    --good: #5FB98A;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; background:var(--bg); color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; overflow:hidden; }

  body{ position:relative; display:flex; }

  ::-webkit-scrollbar{ display:none; }

  .backdrop{ position:fixed; inset:0; z-index:0;
    background: radial-gradient(60% 50% at 82% 8%, rgba(255,91,53,0.16), transparent 70%),
                linear-gradient(180deg, var(--bg-alt) 0%, var(--bg) 55%); }

  .glow{ position:fixed; width:60vw; height:60vw; left:-10%; top:85%; transform:translate(-50%,-50%);
    background: radial-gradient(circle, var(--accent) 0%, transparent 62%);
    opacity:0.08; filter:blur(50px); transition:background 600ms ease, opacity 600ms ease; z-index:0; pointer-events:none; }

  .vignette{ position:fixed; inset:0; z-index:1; pointer-events:none;
    background: radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%); }

  /* ---------- Sidebar ---------- */
  .sidebar{ position:relative; z-index:3; width:86px; flex-shrink:0; height:100%;
    display:flex; flex-direction:column; align-items:center; gap:6px; padding:5vh 0; }

  .nav-item{ width:64px; height:64px; border-radius:14px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:5px; color:var(--text-muted); cursor:pointer;
    border:1px solid transparent; transition:all 180ms ease; outline:none; }
  .nav-item svg{ width:22px; height:22px; }
  .nav-item span{ font-size:9.5px; letter-spacing:0.05em; text-transform:uppercase; font-weight:600; }
  .nav-item.active{ color:var(--text); }
  .nav-item.focused{ background:var(--glass); border-color:var(--glass-border); color:var(--accent);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    box-shadow:0 0 24px -8px var(--accent); transform:scale(1.06); }

  /* ---------- Content ---------- */
  .content-wrap{ position:relative; z-index:2; flex:1; height:100%; padding:5vh 4vw 4vh 3.6vw;
    display:flex; flex-direction:column; overflow:hidden; }

  header{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:3.5vh; }
  .greeting{ font-size:clamp(24px,2.8vw,38px); font-weight:600; letter-spacing:-0.01em; }
  .clock{ font-size:clamp(14px,1.2vw,18px); color:var(--text-muted); font-variant-numeric:tabular-nums; }

  .screens{ flex:1; overflow-y:auto; padding-bottom:4vh; }
  .screen{ display:none; flex-direction:column; gap:4.2vh; }
  .screen.active{ display:flex; }

  /* Hero */
  .hero{ position:relative; border-radius:18px; padding:4vh 3vw; min-height:26vh;
    display:flex; flex-direction:column; justify-content:flex-end; gap:10px;
    background:var(--glass-hi); backdrop-filter:blur(22px) saturate(160%); -webkit-backdrop-filter:blur(22px) saturate(160%);
    border:1px solid var(--glass-border); cursor:pointer; outline:none;
    transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease; }
  .hero.focused{ transform:scale(1.008); border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent), 0 0 30px -14px var(--accent); }
  .hero .eyebrow{ font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent-light); font-weight:700; }
  .hero h1{ font-size:clamp(26px,3vw,40px); font-weight:800; letter-spacing:-0.01em; }
  .hero p{ color:var(--text-muted); font-size:14px; }
  .hero-matchup{ display:flex; align-items:center; gap:20px; }
  .hero-badge{ width:clamp(36px,4vw,56px); height:clamp(36px,4vw,56px); object-fit:contain; flex-shrink:0; }
  .hero-team{ display:flex; flex-direction:column; align-items:center; gap:5px; flex-shrink:0; }
  .hero-position{ font-size:11px; font-weight:700; color:var(--text-muted); }

  .row-label{ font-size:13px; text-transform:uppercase; letter-spacing:0.16em; color:var(--text-muted);
    margin-bottom:1.8vh; font-weight:600; display:flex; align-items:center; gap:10px; }
  .row-label .count{ color:var(--accent-light); }

  .row{ display:flex; gap:1.6vw; overflow-x:auto; padding:6px 10px 14px 10px; scroll-behavior:smooth; }

  /* Generic card - deliberately NO backdrop-filter here: this rule is shared by
     every card type including table rows, and a Fire TV Stick's GPU chokes on
     dozens of simultaneously-blurred elements (this was the real cause of the
     sluggishness). Plain translucency + border reads glassy enough without it. */
  .card{ position:relative; flex-shrink:0; background:var(--glass); border-radius:14px;
    border:1px solid var(--glass-border); cursor:pointer; outline:none;
    transition: transform 200ms cubic-bezier(.2,.8,.3,1), box-shadow 200ms ease, border-color 200ms ease, background 200ms ease; }
  .card:hover{ background:var(--glass-hi); }
  .card.focused{ transform:scale(1.08); background:var(--glass-hi); border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent), 0 16px 34px -12px rgba(0,0,0,0.6), 0 0 30px -8px var(--accent); z-index:2; }

  /* App card */
  .card--app{ width:15vw; max-width:210px; min-width:150px; aspect-ratio:16/10;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
  .card--app .icon{ width:42px; height:42px; display:flex; align-items:center; justify-content:center; color:var(--text); opacity:0.9; }
  .card--app .icon svg{ width:100%; height:100%; }
  .card--app .icon img{ width:100%; height:100%; object-fit:contain; border-radius:9px; }
  .icon-letter{ font-size:20px; font-weight:800; color:var(--text-muted); }
  .card--app .label{ font-size:14px; font-weight:600; color:var(--text-muted); }
  .card--app.focused .label{ color:var(--text); }
  .card--app-cw{ aspect-ratio:16/11.5; gap:8px; }

  /* Icon-only app tile - no border/background/label, just the icon itself */
  .card--app-plain{ background:transparent; border:none; width:12vw; max-width:150px; min-width:112px;
    aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; padding:0; }
  .card--app-plain .icon{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:var(--text); }
  .card--app-plain .icon svg{ width:76%; height:76%; }
  .card--app-plain .icon img{ width:100%; height:100%; object-fit:contain; border-radius:20%; }
  .card--app-plain:hover{ background:transparent; }
  .card--app-plain.focused{ background:transparent; border:none; box-shadow:none; transform:scale(1.14); }
  .card--app-plain.focused .icon img, .card--app-plain.focused .icon svg{ filter:drop-shadow(0 0 16px var(--accent)); }
  .card--app-plain.focused .icon-letter{ color:var(--accent); }
  .card--app-cw .cw-time{ font-size:11px; color:var(--text-muted); opacity:0.75; }

  /* Apps screen - wraps top-to-bottom instead of scrolling left-to-right. */
  .apps-grid{ display:flex; flex-wrap:wrap; gap:2.6vh 1.6vw; align-content:flex-start; }

  /* Channel card */
  .card--channel{ width:17vw; max-width:230px; min-width:170px; padding:16px; display:flex; flex-direction:column; gap:8px; }
  .card--channel .ch-name{ font-size:15px; font-weight:700; }
  .card--channel .ch-now{ font-size:12px; color:var(--text-muted); }
  .card--channel .ch-time{ font-size:11px; color:var(--text-muted); opacity:0.7; }
  .card--channel.focused .ch-name{ color:var(--accent-light); }

  /* Fixture / score card */
  .card--fixture{ width:22vw; max-width:300px; min-width:220px; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .fx-comp{ font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); }
  .fx-teams{ display:flex; flex-direction:column; gap:3px; font-size:14px; font-weight:600; }
  .fx-teams .fx-home, .fx-teams .fx-away{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fx-vs{ color:var(--text-muted); font-weight:400; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; }
  .fx-meta{ font-size:11.5px; color:var(--text-muted); display:flex; align-items:center; gap:6px; }
  .live-dot{ width:7px; height:7px; border-radius:50%; background:var(--live); animation:blink 1.1s infinite; }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.25;} }
  .fx-score{ font-size:20px; font-weight:700; }
  .card--fixture.live{ box-shadow:0 0 0 1px rgba(255,91,53,.5), 0 0 24px -8px var(--accent); }
  .card--fixture.live .fx-meta{ color:var(--accent-light); }

  .empty-state{ color:var(--text-muted); font-size:14px; padding:3vh 0; }

  .toast{ position:fixed; bottom:5vh; left:50%; transform:translateX(-50%) translateY(20px);
    background:rgba(14,17,24,0.9); border:1px solid var(--glass-border); padding:12px 22px;
    border-radius:10px; font-size:14px; opacity:0; pointer-events:none; z-index:6;
    transition:opacity 240ms ease, transform 240ms ease; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .goal-toast{ position:fixed; top:4vh; right:3vw; max-width:34vw;
    background:rgba(14,17,24,0.94); border:1px solid var(--accent); padding:14px 22px;
    border-radius:12px; font-size:15px; font-weight:700; opacity:0; pointer-events:none; z-index:10;
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    transform:translateX(24px); transition:opacity 260ms ease, transform 260ms ease;
    box-shadow:0 0 40px -10px var(--accent), 0 10px 30px -10px rgba(0,0,0,0.6); }
  .goal-toast.show{ opacity:1; transform:translateX(0); }
  .goal-toast .gt-comp{ font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent-light); margin-bottom:4px; }
  .goal-toast .gt-header{ display:flex; align-items:center; gap:10px; margin-bottom:3px; }
  .goal-toast .gt-badge{ width:28px; height:28px; object-fit:contain; flex-shrink:0; }
  .goal-toast .gt-team{ font-size:17px; font-weight:800; }
  .goal-toast .gt-score{ font-size:14px; color:var(--text-muted); font-variant-numeric:tabular-nums; font-weight:600; }
  .goal-toast .gt-scorer{ font-size:13px; color:var(--accent-light); font-weight:600; margin-top:6px; }

  /* YouTube device-code sign-in overlay */
  .yt-overlay{ position:fixed; inset:0; z-index:20; display:none; align-items:center; justify-content:center;
    background:rgba(5,6,9,0.72); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
  .yt-overlay.show{ display:flex; }
  .yt-modal{ width:46vw; max-width:560px; padding:5vh 4vw; border-radius:20px; text-align:center;
    background:var(--glass-hi); border:1px solid var(--glass-border);
    backdrop-filter:blur(26px) saturate(160%); -webkit-backdrop-filter:blur(26px) saturate(160%); }
  .yt-eyebrow{ font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent-light); font-weight:700; margin-bottom:2vh; }
  .yt-code{ font-size:clamp(28px,4vw,44px); font-weight:800; letter-spacing:0.12em; font-variant-numeric:tabular-nums; margin-bottom:2vh; }
  .yt-modal p{ color:var(--text-muted); font-size:14px; line-height:1.6; }
  .yt-modal p b{ color:var(--text); }
  .yt-spinner{ width:22px; height:22px; margin:3vh auto 0; border-radius:50%;
    border:2px solid var(--glass-border); border-top-color:var(--accent); animation:yt-spin 900ms linear infinite; }
  @keyframes yt-spin{ to{ transform:rotate(360deg); } }

  /* Initial-load overlay - covers the burst of re-renders while football/
     YouTube data streams in on first launch, rather than showing a sluggish
     half-loaded page during that window. */
  .loading-overlay{ position:fixed; inset:0; z-index:30; display:flex; align-items:center; justify-content:center;
    background:var(--bg); transition:opacity 300ms ease; }
  .loading-overlay.hide{ opacity:0; pointer-events:none; }
  .loading-spinner{ width:40px; height:40px; border-radius:50%;
    border:3px solid var(--glass-border); border-top-color:var(--accent); animation:yt-spin 900ms linear infinite; }

  /* Video card (YouTube subscriptions row) */
  .card--video{ width:20vw; max-width:270px; min-width:200px; display:flex; flex-direction:column; gap:8px; overflow:hidden; padding-bottom:12px; }
  .card--video .thumb{ width:100%; aspect-ratio:16/9; background:var(--glass-hi); }
  .card--video .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card--video .vinfo{ padding:0 12px; display:flex; flex-direction:column; gap:3px; }
  .card--video .vtitle{ font-size:13px; font-weight:700; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card--video .vchannel{ font-size:11.5px; color:var(--text-muted); }
  .card--video .vtime{ font-size:11px; color:var(--text-muted); opacity:0.7; }
  .card--signin{ width:20vw; max-width:270px; min-width:200px; padding:16px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; aspect-ratio:16/9; }
  .card--signin .label{ font-size:13px; font-weight:700; }
  .card--signin .sub{ font-size:11.5px; color:var(--text-muted); }

  /* Table rows (league standings) */
  .table{ display:flex; flex-direction:column; gap:5px; }
  .table-head{ display:flex; align-items:center; gap:14px; padding:0 20px; margin-bottom:2px; flex-shrink:0;
    font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); }
  .card--trow{ width:100%; display:flex; align-items:center; gap:14px; padding:5px 18px;
    flex:0 0 auto; min-height:26px; }
  .card--trow.focused{ transform:scale(1.008); }
  .card--trow .tpos{ width:22px; font-weight:700; color:var(--text-muted); font-size:12px; }
  .card--trow .tname{ flex:1; font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card--trow.highlight .tname{ color:var(--accent-light); }
  .card--trow.highlight{ background:rgba(255,91,53,0.13); }
  .card--trow .tstat{ width:36px; text-align:center; font-size:11.5px; color:var(--text-muted); }
  .card--trow .tpts{ width:40px; text-align:center; font-size:13px; font-weight:700; }
  .th-team{ flex:1; } .th-stat{ width:40px; text-align:center; } .th-pts{ width:44px; text-align:center; } .th-pos{ width:24px; }

  /* Gameweek fixture rows - a vertical list (like the table), not a
     horizontal scroller, so it can sit beside the table naturally. */
  .gw-list{ display:flex; flex-direction:column; gap:6px; }
  .card--gwrow{ display:flex; align-items:center; padding:9px 16px; gap:10px; }
  .card--gwrow.focused{ transform:scale(1.01); }
  .gw-team{ display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; flex:1; min-width:0; }
  .gw-team-away{ justify-content:flex-end; text-align:right; }
  .gw-name{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .gw-badge{ width:20px; height:20px; object-fit:contain; flex-shrink:0; }
  .gw-score{ font-size:14px; font-weight:800; font-variant-numeric:tabular-nums; min-width:52px; text-align:center; flex-shrink:0; }
  .gw-score.gw-live{ color:var(--accent-light); }
  .gw-time{ font-size:11.5px; color:var(--text-muted); min-width:70px; text-align:center; font-variant-numeric:tabular-nums; flex-shrink:0; }

  /* Sports screen: Wolves hero, then live games and the Championship section -
     the whole screen scrolls normally like every other screen, so tables
     just take their natural height. */
  .sports-cols{ display:grid; grid-template-columns:1fr 1.5fr; gap:2.4vw; }
  .sports-left{ display:flex; flex-direction:column; gap:2vh; }
  .sports-right{ display:flex; flex-direction:column; gap:1vh; }

</style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

  <div class="backdrop"></div>
  <div class="glow" id="glow"></div>
  <div class="vignette"></div>

  <nav class="sidebar" id="sidebar"></nav>

  <div class="content-wrap">
    <header>

   (ELC) only for now - Premier League is parked, easy to bring back
   later by mirroring the ELC calls below with competitions=PL.
   ========================================================= */
let LIVE_SCORES = [];      // live Championship matches right now
let WOLVES_NEXT = null;    // Wolves' next scheduled fixture
let TABLE_ELC = [];        // Championship standings
let GAMEWEEK_ELC = [];     // every Championship match in the current matchday/gameweek
let WOLVES_ID = null;
// The season the table/fixtures default to without an explicit season= param
// doesn't reliably match the season football-data.org actually reports back
// (it can silently return last season's finished standings) - so this is
// resolved once from the competition info and passed explicitly everywhere.
let ELC_SEASON_YEAR = null;
const prevScores = {};     // matchId -> {hs,as}, for goal detection

// Every call runs the actual network request on a background thread on the
// native side and resolves this Promise via a callback, so the page's JS never
// blocks waiting on the network (previously a synchronous bridge call froze
// input/rendering for the duration of every request).
let __reqCounter = 0;
window.__httpCallbacks = {};
window.__httpGetCallback = function(requestId, raw){
  const cb = window.__httpCallbacks[requestId];
  delete window.__httpCallbacks[requestId];
  if(cb) cb(raw);
};

function apiGet(path){
  // In the real app, window.Android exists and does the fetch natively (see
  // MainActivity.kt) to sidestep CORS. When opened directly in a desktop
  // browser for local testing there's no such bridge, so fall back to the dev
  // server's /api-proxy route instead, which adds the CORS header the real
  // football-data.org API doesn't send.
  if(!(window.Android && typeof window.Android.httpGetAsync === 'function')){
    return fetch('/api-proxy' + path)
      .then(r => r.json())
      .then(data => {
        if(data && (data.error || data.message)){
          console.warn('Football API error:', data.error || data.message);
          return null;
        }
        return data;
      })
      .catch(e => { console.warn('Football API fetch error', e); return null; });
  }
  return new Promise((resolve) => {
    const id = 'r' + (__reqCounter++);
    window.__httpCallbacks[id] = (raw) => {
      try{
        const data = JSON.parse(raw);
        if(data && (data.error || data.message)){
          console.warn('Football API error:', data.error || data.message);
          resolve(null); return;
        }
        resolve(data);
      }catch(e){ console.warn('Football API parse error', e); resolve(null); }
    };
    window.Android.httpGetAsync(path, id);
  });
}

   Play Services, so this uses the same code-on-screen flow real
   YouTube/Google TV apps use, not the usual Google Sign-In library),
   then aggregates recent uploads across every subscribed channel.
   ========================================================= */

window.__ytSignInComplete = function(requestId, success, errorMsg){

    showToast('Signed in to YouTube');

    showToast(`YouTube sign-in failed: ${errorMsg || 'unknown error'}`);
  }

function startYouTubeSignIn(){
  if(ytSignInBusy) return;
  if(!(window.Android && typeof window.Android.startYouTubeSignIn === 'function')){
    showToast('YouTube sign-in only works in the real app, not this preview.');
    return;
  }
  ytSignInBusy = true;
  document.getElementById('ytCode').textContent = '------';
  document.getElementById('ytOverlay').classList.add('show');
  window.Android.startYouTubeSignIn('yt' + (__reqCounter++));
}

function fetchYouTubeSubscriptions(){
  return new Promise((resolve) => {
    if(!(window.Android && typeof window.Android.getYouTubeSubscriptionFeed === 'function')){ resolve(null); return; }
    const id = 'r' + (__reqCounter++);
    window.__httpCallbacks[id] = (raw) => {
      try{
        const data = JSON.parse(raw);
        if(data && data.error){ console.warn('YouTube API error:', data.error); resolve(null); return; }
        resolve(data.videos || []);
      }catch(e){ console.warn('YouTube API parse error', e); resolve(null); }
    };
    window.Android.getYouTubeSubscriptionFeed(id);
  });
}

async function refreshYouTube(){
  if(!YT_SIGNED_IN) return;
  const videos = await fetchYouTubeSubscriptions();
  if(videos){
    videos.sort((a,b) => new Date(b.publishedAt) - new Date(a.publishedAt));
    YT_VIDEOS = videos.slice(0, 10);
    rebuildIfActive();
  }
}

function relativeTimeIso(iso){
  const ms = Date.now() - new Date(iso).getTime();
  const hours = Math.round(ms / 3600000);
  if(hours < 1) return 'Just uploaded';
  if(hours < 24) return `${hours}h ago`;
  const days = Math.round(hours/24);
  if(days < 7) return `${days}d ago`;
  return `${Math.round(days/7)}w ago`;
}

function ordinal(n){
  const j = n % 10, k = n % 100;
  if(j === 1 && k !== 11) return n + 'st';
  if(j === 2 && k !== 12) return n + 'nd';
  if(j === 3 && k !== 13) return n + 'rd';
  return n + 'th';
}

async function resolveTeamId(compCode, nameContains){
  const data = await apiGet(`/competitions/${compCode}/teams`);
  if(!data || !data.teams) return null;
  const needle = nameContains.toLowerCase();
  const found = data.teams.find(t =>
    (t.name||'').toLowerCase().includes(needle) || (t.shortName||'').toLowerCase().includes(needle));
  return found ? found.id : null;
}

function normalizeMatch(m){
  const state = (m.status === 'IN_PLAY' || m.status === 'PAUSED') ? 'live'
    : (m.status === 'FINISHED' ? 'finished' : 'scheduled');
  const kickoff = new Date(m.utcDate);
  let minuteLabel = '';
  if(m.status === 'PAUSED') minuteLabel = 'HT';
  else if(m.status === 'IN_PLAY'){
    const mins = Math.max(1, Math.min(90, Math.floor((Date.now() - kickoff.getTime()) / 60000)));
    minuteLabel = `${mins}'`;
  }
  const timeStr = kickoff.toLocaleString('en-GB', { weekday:'short', hour:'2-digit', minute:'2-digit', hour12:false });
  return {
    id: 'm' + m.id,
    comp: (m.competition && m.competition.name) || '',
    compCode: (m.competition && m.competition.code) || '',
    home: (m.homeTeam && (m.homeTeam.shortName || m.homeTeam.name)) || '?',
    away: (m.awayTeam && (m.awayTeam.shortName || m.awayTeam.name)) || '?',
    homeId: (m.homeTeam && m.homeTeam.id) || null,
    awayId: (m.awayTeam && m.awayTeam.id) || null,
    homeCrest: (m.homeTeam && m.homeTeam.crest) || '',
    awayCrest: (m.awayTeam && m.awayTeam.crest) || '',
    hs: (m.score && m.score.fullTime && m.score.fullTime.home != null) ? m.score.fullTime.home : 0,
    as: (m.score && m.score.fullTime && m.score.fullTime.away != null) ? m.score.fullTime.away : 0,
    state, minuteLabel, time: timeStr, utcDate: m.utcDate,
  };
}

/* ---- goal detection -> top-right toast ---- */
let goalQueue = [];
let goalToastBusy = false;
function queueGoalToast(comp, scoringTeam, scoreLine, scorer, crest){
  goalQueue.push({comp, scoringTeam, scoreLine, scorer, crest});
  if(!goalToastBusy) processGoalQueue();
}
function processGoalQueue(){
  if(!goalQueue.length){ goalToastBusy = false; return; }
  goalToastBusy = true;
  const { comp, scoringTeam, scoreLine, scorer, crest } = goalQueue.shift();
  const t = document.getElementById('goalToast');
  t.innerHTML = `<div class="gt-comp">⚽ GOAL · ${comp}</div>
    <div class="gt-header">${crest ? `<img class="gt-badge" src="${crest}" alt="">` : ''}<div class="gt-team">${scoringTeam}</div></div>
    <div class="gt-score">${scoreLine}</div>
    ${scorer ? `<div class="gt-scorer">${scorer}</div>` : ''}`;
  t.classList.add('show');
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(processGoalQueue, 300);
  }, 4500);
}

// Football-data.org has no scorer data at all, so this asks Sofascore (a
// separate service, called only at this exact moment - never polled) who
// scored, by matching the goal that brought the match to this exact score.
// Waits up to 4s for an answer; if it's not back by then, or the lookup fails
// for any reason (name-matching miss, event not published yet), the toast
// just shows without a scorer name rather than being held up.
function fetchGoalScorer(m){
  return new Promise((resolve) => {
    if(!(window.Android && typeof window.Android.getGoalScorer === 'function')){ resolve(null); return; }
    const id = 'r' + (__reqCounter++);
    const timeout = setTimeout(() => { delete window.__httpCallbacks[id]; resolve(null); }, 4000);
    window.__httpCallbacks[id] = (raw) => {
      clearTimeout(timeout);
      try{
        const data = JSON.parse(raw);
        resolve(data && data.scorer ? data.scorer : null);
      }catch(e){ resolve(null); }
    };
    window.Android.getGoalScorer(m.home, m.away, m.utcDate, m.hs, m.as, id);
  });
}

async function announceGoal(m, isHomeGoal){
  const scoringTeam = isHomeGoal ? m.home : m.away;
  const scoringCrest = isHomeGoal ? m.homeCrest : m.awayCrest;
  const scoreLine = `${m.home} ${m.hs} – ${m.as} ${m.away}`;
  const scorer = await fetchGoalScorer(m);
  queueGoalToast(m.comp, scoringTeam, scoreLine, scorer, scoringCrest);
}

function detectGoals(matches){
  matches.forEach(m => {
    const prev = prevScores[m.id];
    if(prev){
      if(m.hs > prev.hs) announceGoal(m, true);
      if(m.as > prev.as) announceGoal(m, false);
    }
    prevScores[m.id] = { hs: m.hs, as: m.as };
  });
}

/* ---- fetch cycles ---- */
// Live matches are "right now" by definition, so no date filter is needed -
// this also means the Live Games row only ever shows matches actually in
// play, never ones that have already finished.
async function refreshLiveAndToday(){
  const liveResp = await apiGet('/matches?competitions=ELC&status=IN_PLAY,PAUSED');
  const live = (liveResp && liveResp.matches) ? liveResp.matches.map(normalizeMatch) : [];
  detectGoals(live);
  LIVE_SCORES = live;
  rebuildIfActive();
}

// Resolves and caches the season year football-data.org should be using for
// ELC right now, from the competition's own currentSeason info. Needed
// because the standings/fixtures endpoints don't reliably default to it on
// their own without an explicit season= param - the endpoint has been
// observed silently returning last season's finished table instead.
async function ensureElcSeasonYear(){
  if(ELC_SEASON_YEAR !== null) return ELC_SEASON_YEAR;
  const elcComp = await apiGet('/competitions/ELC');
  const currentSeason = elcComp && elcComp.currentSeason;
  if(currentSeason && currentSeason.startDate) ELC_SEASON_YEAR = currentSeason.startDate.slice(0, 4);
  return ELC_SEASON_YEAR;
}

async function refreshSlow(isRetry){
  if(WOLVES_ID === null) WOLVES_ID = await resolveTeamId('ELC', 'wolverhampton');
  const seasonYear = await ensureElcSeasonYear();

  const [wolvesNextResp, elcStand] = await Promise.all([
    WOLVES_ID ? apiGet(`/teams/${WOLVES_ID}/matches?status=SCHEDULED&limit=1`) : Promise.resolve(null),
    apiGet(`/competitions/ELC/standings${seasonYear ? `?season=${seasonYear}` : ''}`),
  ]);

  WOLVES_NEXT = (wolvesNextResp && wolvesNextResp.matches && wolvesNextResp.matches[0]) ? normalizeMatch(wolvesNextResp.matches[0]) : null;
  TABLE_ELC = (elcStand && elcStand.standings)
    ? (elcStand.standings.find(s => s.type === 'TOTAL') || elcStand.standings[0]).table : [];

  rebuildIfActive();
  // Self-heal quickly rather than waiting a full 5 minutes for the next cycle
  // if a transient failure (e.g. a rate-limit collision at startup) left
  // either of these empty.
  if(!isRetry && (!WOLVES_NEXT || !TABLE_ELC.length)) setTimeout(() => refreshSlow(true), 15000);
}

// The "This Gameweek" list shows the whole current matchday (which can span
// several days), not just today - so this looks up the current matchday
// number, then fetches every match in it. Runs on its own longer interval
// (matchdays barely change) rather than piggybacking on refreshSlow - that
// was stacking enough calls into the same 60-second window as
// refreshLiveAndToday to occasionally exceed the API's 10-requests/minute
// cap, which is why fixtures could get stuck on "Loading" indefinitely (a
// failed fetch just silently stayed empty). If a fetch does fail, this
// retries once after a short delay instead of waiting for the next interval.
async function refreshGameweeks(isRetry){
  const elcComp = await apiGet('/competitions/ELC');
  const currentSeason = elcComp && elcComp.currentSeason;
  const elcMatchday = currentSeason ? currentSeason.currentMatchday : null;
  if(currentSeason && currentSeason.startDate) ELC_SEASON_YEAR = currentSeason.startDate.slice(0, 4);
  const elcFixturesResp = (elcMatchday && ELC_SEASON_YEAR)
    ? await apiGet(`/competitions/ELC/matches?matchday=${elcMatchday}&season=${ELC_SEASON_YEAR}`)
    : null;
  GAMEWEEK_ELC = (elcFixturesResp && elcFixturesResp.matches) ? elcFixturesResp.matches.map(normalizeMatch) : [];
  rebuildIfActive();
  if(!isRetry && !GAMEWEEK_ELC.length) setTimeout(() => refreshGameweeks(true), 15000);
}

/* =========================================================
   APP USAGE — "Continue Watching" ranking.
   There's no real per-show watch history available from any of these
   apps (Netflix/Disney+/etc don't expose it, and Fire OS doesn't have
   Android TV's Watch Next API) - so this tracks what YOU actually launch
   through this launcher instead, and ranks apps by a mix of recency,
   how often you open them, and whether you tend to open them around
   this time of day.
   ========================================================= */
function loadAppEvents(){
  try{ return JSON.parse(localStorage.getItem('firetv_app_events')) || []; }
  catch(e){ return []; }
}
function recordAppOpen(pkg, name){
  try{
    const events = loadAppEvents();
    events.push({ pkg, name, ts: Date.now() });
    localStorage.setItem('firetv_app_events', JSON.stringify(events.slice(-200)));
  }catch(e){}
}

function getRankedRecentApps(){
  const events = loadAppEvents();
  if(!events.length) return [];
  const now = Date.now();
  const currentHour = new Date().getHours();
  const byPkg = {};
  events.forEach(e => {
    if(!byPkg[e.pkg]) byPkg[e.pkg] = { pkg:e.pkg, name:e.name, lastOpened:0, opens:[] };
    const app = byPkg[e.pkg];
    app.opens.push(e.ts);
    if(e.ts > app.lastOpened) app.lastOpened = e.ts;
  });
  const ranked = Object.values(byPkg).map(app => {
    const hoursSinceOpen = (now - app.lastOpened) / 3600000;
    const recencyScore = 1 / (hoursSinceOpen + 1);
    const last30DaysCount = app.opens.filter(ts => (now - ts) < 30*24*3600000).length;
    const sameTimeOfDayCount = app.opens.filter(ts => {
      const h = new Date(ts).getHours();
      const diff = Math.min(Math.abs(h - currentHour), 24 - Math.abs(h - currentHour));
      return diff <= 2;
    }).length;
    return { ...app, score: recencyScore*3 + last30DaysCount*1 + sameTimeOfDayCount*2 };
  });
  ranked.sort((a,b) => b.score - a.score);
  return ranked;
}

function relativeTime(ts){
  const mins = Math.round((Date.now() - ts) / 60000);
  if(mins < 1) return 'Just now';
  if(mins < 60) return `Opened ${mins} min ago`;
  const hours = Math.round(mins/60);
  if(hours < 24) return `Opened ${hours}h ago`;
  const days = Math.round(hours/24);
  return `Opened ${days}d ago`;
}

/* =========================================================
   RENDER HELPERS
   ========================================================= */
function el(tag, cls, html){ const e = document.createElement(tag); if(cls) e.className = cls; if(html!==undefined) e.innerHTML = html; return e; }

function appIconHtml(app){
  return app.svg ? app.svg : `<span class="icon-letter">${app.name.charAt(0)}</span>`;
}

// Icons are decoded/base64-encoded natively on every call, which isn't free -
// with 20+ apps now shown, re-fetching all of them on every re-render (which
// happens repeatedly while football/YouTube data streams in) was the actual
// cause of the sluggishness, not just a missing spinner. Cache per package for
// the life of the page so each icon is only ever fetched once.
const iconCache = {};
function getCachedAppIcon(pkg){
  if(Object.prototype.hasOwnProperty.call(iconCache, pkg)) return iconCache[pkg];
  if(!(window.Android && typeof window.Android.getAppIcon === 'function')){ iconCache[pkg] = null; return null; }
  try{
    iconCache[pkg] = window.Android.getAppIcon(pkg) || null;
  }catch(e){ iconCache[pkg] = null; }
  return iconCache[pkg];
}

// Only show apps that are actually installed (i.e. the native side found a
// real icon for them) - otherwise you'd see the hand-drawn placeholder shapes
// or a plain letter tile, which look broken/wrong-colored next to real icons.
// In a desktop browser preview there's no Android bridge to check installation
// status at all, so everything shows there (nothing to filter against).
function getVisibleApps(){
  if(!(window.Android && typeof window.Android.getAppIcon === 'function')) return APPS;
  return APPS.filter(app => !!getCachedAppIcon(app.pkg));
}

function appCard(app){
  const c = el('div','card card--app-plain'); c.tabIndex = 0;
  c.dataset.kind = 'app'; c.dataset.pkg = app.pkg; c.dataset.name = app.name;
  c.innerHTML = `<div class="icon">${appIconHtml(app)}</div>`;
  const uri = getCachedAppIcon(app.pkg);
  if(uri) c.querySelector('.icon').innerHTML = `<img src="${uri}" alt="${app.name}">`;
  return c;
}

function continueWatchingCard(rankedApp){
  const c = el('div','card card--app card--app-cw'); c.tabIndex = 0;
  c.dataset.kind = 'app'; c.dataset.pkg = rankedApp.pkg; c.dataset.name = rankedApp.name;
  const knownApp = APPS.find(a => a.pkg === rankedApp.pkg);
  c.innerHTML = `<div class="icon">${appIconHtml(knownApp || rankedApp)}</div><div class="label">${rankedApp.name}</div><div class="cw-time">${relativeTime(rankedApp.lastOpened)}</div>`;
  const uri = getCachedAppIcon(rankedApp.pkg);
  if(uri) c.querySelector('.icon').innerHTML = `<img src="${uri}" alt="${rankedApp.name}">`;
  return c;
}

  def.el.innerHTML = ''; def.navRows = [];

  const hero = el('div','hero'); hero.tabIndex = 0;
  const liveMatch = LIVE_SCORES[0];
  const rankedApps = getRankedRecentApps();
  const topApp = rankedApps[0];
  if(liveMatch){
    hero.dataset.kind = 'fixture'; hero.dataset.id = liveMatch.id; hero.dataset.name = `${liveMatch.home} vs ${liveMatch.away}`;
    hero.innerHTML = `<div class="eyebrow">LIVE · ${liveMatch.comp}</div><h1>${liveMatch.home} ${liveMatch.hs} – ${liveMatch.as} ${liveMatch.away}</h1><p>${liveMatch.minuteLabel}</p>`;
  } else if(topApp){
    hero.dataset.kind = 'app'; hero.dataset.pkg = topApp.pkg; hero.dataset.name = topApp.name;
    hero.innerHTML = `<div class="eyebrow">Continue Watching</div><h1>${topApp.name}</h1><p>${relativeTime(topApp.lastOpened)}</p>`;
  } else {
    hero.innerHTML = `<div class="eyebrow">Welcome</div><h1>Pick something to open</h1><p>Whatever you open will show up here next time.</p>`;
  }
  def.el.appendChild(hero); def.navRows.push([hero]);

  const appCards = getVisibleApps().map(appCard);
  const { wrap: appWrap } = row(null, appCards);
  def.el.appendChild(appWrap); def.navRows.push(appCards);

  if(YT_SIGNED_IN && YT_VIDEOS.length){
    const vidCards = YT_VIDEOS.map(videoCard);
    const { wrap } = row('New From Your Subscriptions', vidCards);
    def.el.appendChild(wrap); def.navRows.push(vidCards);
  } else if(!YT_SIGNED_IN){
    const card = signInCard();
    const { wrap } = row('New From Your Subscriptions', [card]);
    def.el.appendChild(wrap); def.navRows.push([card]);
  }

  if(rankedApps.length){
    const cwCards = rankedApps.slice(0,6).map(continueWatchingCard);
    const { wrap } = row('Continue Watching', cwCards);
    def.el.appendChild(wrap); def.navRows.push(cwCards);
  }
}

function renderGuide(){
  const def = screenDefs.guide;
  def.el.innerHTML = ''; def.navRows = [];
  const half = Math.ceil(CHANNELS.length/2);
  [CHANNELS.slice(0,half), CHANNELS.slice(half)].forEach((group, i) => {
    const cards = group.map(channelCard);
    const { wrap } = row(i===0 ? 'Live TV' : '\u00A0', cards);
    def.el.appendChild(wrap); def.navRows.push(cards);
  });
}

function gameweekRow(fx){
  const c = el('div','card card--gwrow'); c.tabIndex = 0;
  c.dataset.kind = 'fixture'; c.dataset.id = fx.id;
  c.dataset.name = `${fx.home} vs ${fx.away}`;
  let centerHtml;
  if(fx.state === 'live'){
    centerHtml = `<div class="gw-score gw-live">${fx.hs}–${fx.as}</div>`;
  } else if(fx.state === 'finished'){
    centerHtml = `<div class="gw-score">${fx.hs}–${fx.as}</div>`;
  } else {
    centerHtml = `<div class="gw-time">${fx.time}</div>`;
  }
  const homeBadge = fx.homeCrest ? `<img class="gw-badge" src="${fx.homeCrest}" alt="">` : '';
  const awayBadge = fx.awayCrest ? `<img class="gw-badge" src="${fx.awayCrest}" alt="">` : '';
  c.innerHTML = `
    <div class="gw-team">${homeBadge}<span class="gw-name">${fx.home}</span></div>
    ${centerHtml}
    <div class="gw-team gw-team-away"><span class="gw-name">${fx.away}</span>${awayBadge}</div>`;
  return c;
}

function renderSports(){
  const def = screenDefs.sports;
  def.el.innerHTML = ''; def.navRows = [];

  // Wolves' next game, styled the same as the Home screen's hero.
  const wolvesHero = el('div','hero'); wolvesHero.tabIndex = 0; wolvesHero.dataset.kind = 'fixture';
  if(WOLVES_NEXT){
    wolvesHero.dataset.id = WOLVES_NEXT.id;
    wolvesHero.dataset.name = `${WOLVES_NEXT.home} vs ${WOLVES_NEXT.away}`;
    const wolvesIsHome = WOLVES_NEXT.homeId === WOLVES_ID;
    const opponentId = wolvesIsHome ? WOLVES_NEXT.awayId : WOLVES_NEXT.homeId;
    const wolvesRow = TABLE_ELC.find(r => r.team.id === WOLVES_ID);
    const opponentRow = TABLE_ELC.find(r => r.team.id === opponentId);
    const wolvesPosLabel = wolvesRow ? `<span class="hero-position">${ordinal(wolvesRow.position)}</span>` : '';
    // Opponent might not be in the Championship table at all (e.g. a cup tie
    // against a team from a different division) - just omit the label then.
    const opponentPosLabel = opponentRow ? `<span class="hero-position">${ordinal(opponentRow.position)}</span>` : '';
    const homeBadge = WOLVES_NEXT.homeCrest
      ? `<div class="hero-team"><img class="hero-badge" src="${WOLVES_NEXT.homeCrest}" alt="">${wolvesIsHome ? wolvesPosLabel : opponentPosLabel}</div>` : '';
    const awayBadge = WOLVES_NEXT.awayCrest
      ? `<div class="hero-team"><img class="hero-badge" src="${WOLVES_NEXT.awayCrest}" alt="">${!wolvesIsHome ? wolvesPosLabel : opponentPosLabel}</div>` : '';
    wolvesHero.innerHTML = `<div class="eyebrow">Next Wolves Game</div>
      <div class="hero-matchup">${homeBadge}<h1>${WOLVES_NEXT.home} vs ${WOLVES_NEXT.away}</h1>${awayBadge}</div>
      <p>${WOLVES_NEXT.comp} · ${WOLVES_NEXT.time}</p>`;
  } else {
    wolvesHero.innerHTML = `<div class="eyebrow">Wolves</div><h1>No upcoming fixture found</h1><p>Check back shortly.</p>`;
  }
  def.el.appendChild(wolvesHero); def.navRows.push([wolvesHero]);

  // Live Games - Championship matches actually in play right now, horizontally scrollable.
  const liveNow = LIVE_SCORES.filter(m => m.compCode === 'ELC');
  if(liveNow.length){
    const cards = liveNow.map(fixtureCard);
    const { wrap } = row('Live Games', cards, cards.length);
    def.el.appendChild(wrap); def.navRows.push(cards);
  }

  // Championship - this gameweek's fixtures as a vertical list (with team
  // badges) sitting beside the table, not a horizontal scroller.
  def.el.appendChild(el('div','row-label','Championship'));
  const cols = el('div','sports-cols');
  const left = el('div','sports-left');
  const rightCol = el('div','sports-right');

  left.appendChild(el('div','row-label','This Gameweek'));
  if(GAMEWEEK_ELC.length){
    const listWrap = el('div','gw-list');
    const gwRows = GAMEWEEK_ELC.map(gameweekRow);
    gwRows.forEach(r => listWrap.appendChild(r));
    left.appendChild(listWrap);
    gwRows.forEach(r => def.navRows.push([r]));
  } else {
    left.appendChild(el('div','empty-state','Loading Championship fixtures…'));
  }

  if(TABLE_ELC.length){
    rightCol.appendChild(el('div','row-label','Table'));
    const tableWrap = el('div','table'); tableWrap.appendChild(tableHead());
    const trows = TABLE_ELC.map(r => tableRow(r, WOLVES_ID));
    trows.forEach(tr => tableWrap.appendChild(tr));
    rightCol.appendChild(tableWrap);
    trows.forEach(tr => def.navRows.push([tr]));
  } else {
    rightCol.appendChild(el('div','row-label','Table'));
    rightCol.appendChild(el('div','empty-state','Loading table…'));
  }

  cols.appendChild(left); cols.appendChild(rightCol);
  def.el.appendChild(cols);

  if(!WOLVES_NEXT && !TABLE_ELC.length){
    def.el.appendChild(el('div','empty-state','Loading live football data…'));
  }
}

function renderApps(){
  const def = screenDefs.apps;
  def.el.innerHTML = ''; def.navRows = [];
  def.el.appendChild(el('div','row-label','All Apps'));

  const cards = getVisibleApps().map(appCard);
  const grid = el('div','apps-grid');
  cards.forEach(c => grid.appendChild(c));
  def.el.appendChild(grid);
  // Row grouping can't be measured yet here - this screen is still
  // display:none at this point (Home is active at startup), and hidden
  // elements report offsetTop 0 for everything. measureAppsGrid() does the
  // real measurement once this screen actually becomes visible instead.
}

// Cards wrap left-to-right then top-to-bottom (no horizontal scrolling), so
// Up/Down needs to match whatever row each card actually landed on - grouping
// by offsetTop works regardless of exactly how many fit per row. Only valid
// once the Apps screen is actually visible (display:flex), so this runs from
// activateScreen right after switching to it, not from renderApps at startup.
function measureAppsGrid(){
  const def = screenDefs.apps;
  const cards = Array.from(def.el.querySelectorAll('.card--app-plain'));
  const navRows = [];
  let lastTop = null;
  cards.forEach(c => {
    if(c.offsetTop !== lastTop){ navRows.push([]); lastTop = c.offsetTop; }
    navRows[navRows.length - 1].push(c);
  });
  def.navRows = navRows;
  if(currentScreen === 'apps') refreshFocusVisuals();
}

function rebuildIfActive(){
  renderHome();
  renderSports();
  const rows = currentRows();
  rowIndex = Math.min(rowIndex, Math.max(rows.length-1,0));
  colIndex = Math.min(colIndex, Math.max((rows[rowIndex]||[]).length-1,0));
  if(zone === 'content') refreshFocusVisuals();
}

// isYouTubeSignedIn is a synchronous local-prefs read (no network), so check
// it before the first render to avoid a flash of the "Sign in" card when
// already signed in.
if(window.Android && typeof window.Android.isYouTubeSignedIn === 'function'){
  YT_SIGNED_IN = window.Android.isYouTubeSignedIn();
}

['home','guide','sports','apps'].forEach(ensureScreen);
renderGuide(); renderApps(); renderHome(); renderSports();

/* =========================================================
   SIDEBAR
   ========================================================= */
const sidebarEl = document.getElementById('sidebar');
NAV.forEach((n, i) => {
  const item = el('div','nav-item'); item.tabIndex = 0; item.dataset.screen = n.id;
  item.innerHTML = `<svg viewBox="0 0 24 24" fill="none">${n.icon}</svg><span>${n.label}</span>`;
  sidebarEl.appendChild(item);
});
const navItems = Array.from(sidebarEl.children);

/* =========================================================
   FOCUS / NAVIGATION STATE MACHINE
   ========================================================= */
let currentScreen = 'home';
let zone = 'sidebar';       // 'sidebar' | 'content'
let sidebarIndex = 0;
let rowIndex = 0, colIndex = 0;

function activateScreen(id){
  currentScreen = id;
  Object.keys(screenDefs).forEach(k => screenDefs[k].el.classList.toggle('active', k === id));
  navItems.forEach(n => n.classList.toggle('active', n.dataset.screen === id));
  rowIndex = 0; colIndex = 0;
  if(id === 'apps') requestAnimationFrame(measureAppsGrid);
}

function currentRows(){ return screenDefs[currentScreen].navRows; }

function refreshFocusVisuals(){
  navItems.forEach((n,i) => n.classList.toggle('focused', zone==='sidebar' && i===sidebarIndex));
  document.querySelectorAll('.card, .hero').forEach(c => c.classList.remove('focused'));
  if(zone === 'content'){
    const rows = currentRows();
    if(!rows.length) return;
    const r = rows[Math.min(rowIndex, rows.length-1)];
    const c = r[Math.min(colIndex, r.length-1)];
    if(c){
      c.classList.add('focused');
      c.focus({preventScroll:true});
      c.scrollIntoView({behavior:'smooth', block:'nearest', inline:'nearest'});
    }
  } else {
    navItems[sidebarIndex].focus({preventScroll:true});
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> t.classList.remove('show'), 1600);
}

function activate(cardEl){
  if(!cardEl) return;
  const kind = cardEl.dataset.kind;
  if(kind === 'app'){
    showToast(`Opening ${cardEl.dataset.name}\u2026`);
    recordAppOpen(cardEl.dataset.pkg, cardEl.dataset.name);
    if(window.Android && typeof window.Android.launchApp === 'function'){
      window.Android.launchApp(cardEl.dataset.pkg);
    } else {
      try{ window.location.href = `intent://#Intent;package=${cardEl.dataset.pkg};launchFlags=0x10200000;end`; }catch(e){}
    }
  } else if(kind === 'channel'){
    showToast(`Tuning to ${cardEl.dataset.name}\u2026`);
    // Wire this up to your live-TV app's package/intent to actually switch channel.
  } else if(kind === 'fixture'){
    showToast(`${cardEl.dataset.name}`);
  } else if(kind === 'hero'){
    activateScreen('sports');
    refreshSidebarActive();
  } else if(kind === 'yt-signin'){
    startYouTubeSignIn();
  } else if(kind === 'video'){
    showToast(`${cardEl.dataset.name}`);
    recordAppOpen('com.amazon.firetv.youtube', 'YouTube');
    if(window.Android && typeof window.Android.launchApp === 'function'){
      window.Android.launchApp('com.amazon.firetv.youtube');
    }
  }
}

function refreshSidebarActive(){
  navItems.forEach(n => n.classList.toggle('active', n.dataset.screen === currentScreen));
}

// Called from native Kotlin (MainActivity.onKeyDown) when the remote's Menu
// button is pressed, since WebView doesn't forward that key into page JS.
window.openSidebarFromNative = function(){
  zone = 'sidebar';
  refreshFocusVisuals();
};

document.addEventListener('keydown', (e) => {
  // Fire TV remote's Menu button (three horizontal lines) - jump straight
  // into the sidebar from anywhere so it can be scrolled with Up/Down.
  if(e.key === 'Menu' || e.keyCode === 82){
    zone = 'sidebar';
    refreshFocusVisuals();
    e.preventDefault();
    return;
  }
  if(zone === 'sidebar'){
    if(e.key === 'ArrowDown'){ sidebarIndex = Math.min(sidebarIndex+1, navItems.length-1); refreshFocusVisuals(); e.preventDefault(); }
    else if(e.key === 'ArrowUp'){ sidebarIndex = Math.max(sidebarIndex-1, 0); refreshFocusVisuals(); e.preventDefault(); }
    else if(e.key === 'ArrowRight' || e.key === 'Enter'){
      activateScreen(navItems[sidebarIndex].dataset.screen);
      zone = 'content'; refreshFocusVisuals(); e.preventDefault();
    }
  } else {
    const rows = currentRows();
    if(e.key === 'ArrowLeft'){
      if(colIndex <= 0 || !rows.length){ zone = 'sidebar'; colIndex = 0; }
      else colIndex--;
      refreshFocusVisuals(); e.preventDefault();
    } else if(e.key === 'ArrowRight'){
      const r = rows[rowIndex] || [];
      colIndex = Math.min(colIndex+1, Math.max(r.length-1,0));
      refreshFocusVisuals(); e.preventDefault();
    } else if(e.key === 'ArrowDown'){
      if(rows.length){
        rowIndex = Math.min(rowIndex+1, rows.length-1);
        colIndex = Math.min(colIndex, Math.max((rows[rowIndex]||[]).length-1,0));
      }
      refreshFocusVisuals(); e.preventDefault();
    } else if(e.key === 'ArrowUp'){
      if(rows.length){
        rowIndex = Math.max(rowIndex-1, 0);
        colIndex = Math.min(colIndex, Math.max((rows[rowIndex]||[]).length-1,0));
      }
      refreshFocusVisuals(); e.preventDefault();
    } else if(e.key === 'Enter'){
      const r = rows[rowIndex] || [];
      activate(r[colIndex]); e.preventDefault();
    }
  }
});

// mouse support
sidebarEl.addEventListener('click', (e) => {
  const item = e.target.closest('.nav-item'); if(!item) return;
  sidebarIndex = navItems.indexOf(item);
  activateScreen(item.dataset.screen); zone = 'content'; refreshFocusVisuals();
});
screensEl.addEventListener('click', (e) => {
  const card = e.target.closest('.card, .hero'); if(!card) return;
  activate(card);
});

/* =========================================================
   CLOCK
   ========================================================= */
function updateClock(){
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
  const hour = now.getHours();
  const g = document.getElementById('greetWord');
  g.textContent = hour<5 ? 'Good night' : hour<12 ? 'Good morning' : hour<18 ? 'Good afternoon' : 'Good evening';
}
updateClock(); setInterval(updateClock, 15000);

/* init */
activateScreen('home');
refreshFocusVisuals();

// The loading overlay stays up for exactly the first batch of data (not
// subsequent periodic refreshes), so the sluggish half-loaded page never
// shows - it's covered until everything's actually ready.
// Run one at a time rather than all in parallel - each of these makes several
// of its own calls, and firing them all simultaneously at startup was enough
// to occasionally exceed the football API's 10-requests/minute limit right
// at boot (invisible normally, but very noticeable as "stuck on Loading" the
// one time it happens right when you're watching).
async function initialLoad(){
  await refreshGameweeks();
  await refreshSlow();
  await refreshLiveAndToday();
  if(YT_SIGNED_IN) await refreshYouTube();
  document.getElementById('loadingOverlay').classList.add('hide');
}
setTimeout(initialLoad, 50);

setInterval(refreshLiveAndToday, 60000);  // live scores right now
setInterval(refreshSlow, 300000);         // table + next-game lookups (rarely change)
setInterval(refreshGameweeks, 1200000);   // this gameweek's fixtures, every 20 min (barely changes)
setInterval(refreshYouTube, 900000);      // new uploads from subscriptions, every 15 min
</script>
